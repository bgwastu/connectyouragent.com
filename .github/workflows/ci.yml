name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.22.0"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build bridge binaries (Go cross-compile)
        if: runner.os != 'Windows'
        run: bun run build

      - name: Build Windows bridge binary
        if: runner.os == 'Windows'
        run: bun run build
        env:
          BUILD_TARGETS: windows_amd64

      - name: Run tests
        run: bun test
